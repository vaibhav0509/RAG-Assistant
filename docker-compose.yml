version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.5:latest
      - CHROMA_PERSIST_DIR=/data/chroma
      - API_KEY=enterprise-rag-secret
    volumes:
      - chroma_data:/data/chroma
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
